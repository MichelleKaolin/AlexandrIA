<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sair — AlexandrIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #0B1523; --gold: #C9943A; --white: #FFFFFF; --text-dim: #A0AEC0; }
    body { font-family: 'DM Sans', sans-serif; background-color: var(--navy); color: var(--white); height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    .logout-box { max-width: 400px; padding: 3rem; border: 1px solid rgba(201, 148, 58, 0.2); border-radius: 12px; background: rgba(19, 32, 53, 0.5); }
    h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2rem; margin-bottom: 1rem; }
    p { color: var(--text-dim); margin-bottom: 2rem; font-size: 0.95rem; }
    .btn-confirm { display: block; width: 100%; background: var(--gold); color: var(--navy); padding: 1rem; text-decoration: none; border-radius: 4px; font-weight: 700; margin-bottom: 1rem; transition: 0.3s; }
    .btn-confirm:hover { background: #E8B96A; transform: translateY(-2px); }
    .btn-cancel { display: block; color: var(--text-dim); text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
    .btn-cancel:hover { color: var(--white); }
  </style>
</head>
<body>
  <div class="logout-box">
    <div style="font-size: 3rem; margin-bottom: 1rem;">⚖️</div>
    <h1>Encerrar Sessão?</h1>
    <p>Você está prestes a sair da plataforma AlexandrIA. Suas contribuições salvas não serão perdidas.</p>
    <a href="login.html" class="btn-confirm">Confirmar Saída</a>
    <a href="index_original.html" class="btn-cancel">Voltar ao Início</a>
  </div>
</body>
</html>
