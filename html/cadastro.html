<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta — AlexandrIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* MESMO CSS DA INDEX_ORIGINAL */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #0B1523; --navy-mid: #132035; --navy-card: #162540; --gold: #C9943A; --gold-light: #E8B96A; --white: #FFFFFF; --text-dim: #A0AEC0; }
    body { font-family: 'DM Sans', sans-serif; background-color: var(--navy); color: var(--white); display: flex; flex-direction: column; min-height: 100vh; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 8%; background: rgba(11, 21, 35, 0.95); border-bottom: 1px solid rgba(201, 148, 58, 0.2); }
    .nav-logo-text { color: var(--gold); font-size: 1.5rem; font-weight: 700; font-family: 'Playfair Display', serif; text-decoration: none; }
    .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-card { background: var(--navy-card); border: 1px solid rgba(201, 148, 58, 0.15); padding: 2.5rem; border-radius: 12px; width: 100%; max-width: 500px; }
    h2 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 1.5rem; text-align: center; }
    .input-group { margin-bottom: 1.2rem; }
    .input-group label { display: block; color: var(--gold-light); font-size: 0.8rem; margin-bottom: 0.4rem; }
    .input-group input, .input-group select { width: 100%; background: var(--navy-mid); border: 1px solid rgba(201, 148, 58, 0.3); padding: 0.7rem; border-radius: 4px; color: white; outline: none; }
    .btn-auth { width: 100%; background: var(--gold); color: var(--navy); padding: 0.9rem; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <nav><a href="index_original.html" class="nav-logo-text">Alexandr<span style="color:white; font-style:italic">IA</span></a></nav>
  <div class="auth-container">
    <div class="auth-card">
      <h2>Junte-se à Biblioteca</h2>
      <form>
        <div class="input-group"><label>Nome Completo</label><input type="text" placeholder="Como deseja ser chamado"></div>
        <div class="input-group"><label>E-mail Institucional</label><input type="email" placeholder="seu.nome@fatec.sp.gov.br"></div>
        <div class="input-group">
          <label>Curso</label>
          <select><option>Desenvolvimento de Software Multiplataforma</option><option>Gestão Empresarial</option><option>Logística</option></select>
        </div>
        <div class="input-group"><label>Senha (mínimo 8 caracteres)</label><input type="password" placeholder="••••••••"></div>
        <button type="button" class="btn-auth">Criar Conta</button>
      </form>
    </div>
  </div>
</body>
</html>
