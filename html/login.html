<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — AlexandrIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* CSS MANTIDO DA INDEX_ORIGINAL */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0B1523; --navy-mid: #132035; --navy-light: #1C2E47; --navy-card: #162540;
      --gold: #C9943A; --gold-light: #E8B96A; --white: #FFFFFF; --text-dim: #A0AEC0;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body { font-family: 'DM Sans', sans-serif; background-color: var(--navy); color: var(--white); display: flex; flex-direction: column; min-height: 100vh; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 8%; background: rgba(11, 21, 35, 0.95); border-bottom: 1px solid rgba(201, 148, 58, 0.2); }
    .nav-logo-text { color: var(--gold); font-size: 1.5rem; font-weight: 700; font-family: 'Playfair Display', serif; text-decoration: none; }
    
    .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-card { background: var(--navy-card); border: 1px solid rgba(201, 148, 58, 0.15); padding: 3rem; border-radius: 12px; width: 100%; max-width: 450px; }
    h2 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 2rem; text-align: center; }
    
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; color: var(--gold-light); font-size: 0.85rem; margin-bottom: 0.5rem; }
    .input-group input { width: 100%; background: var(--navy-mid); border: 1px solid rgba(201, 148, 58, 0.3); padding: 0.8rem; border-radius: 4px; color: white; outline: none; transition: var(--transition); }
    .input-group input:focus { border-color: var(--gold); }
    
    /* AJUSTE NO BOTÃO PARA COMPORTAR O LINK */
    .btn-auth { 
      width: 100%; background: var(--gold); color: var(--navy); 
      padding: 1rem; border: none; border-radius: 4px; 
      font-weight: 700; cursor: pointer; transition: var(--transition); 
      text-decoration: none; display: block; text-align: center;
    }
    .btn-auth:hover { background: var(--gold-light); transform: translateY(-2px); }
  </style>
</head>
<body>
  <nav>
    <a href="index_original.html" class="nav-logo-text">Alexandr<span style="color:white; font-style:italic">IA</span></a>
  </nav>
  <div class="auth-container">
    <div class="auth-card">
      <h2>Acessar Biblioteca</h2>
      <form>
        <div class="input-group">
          <label>E-mail Acadêmico</label>
          <input type="email" placeholder="nome@fatec.sp.gov.br">
        </div>
        <div class="input-group">
          <label>Senha</label>
          <input type="password" placeholder="••••••••">
        </div>
        <a href="perfil.html" class="btn-auth">Entrar</a>
      </form>
      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-dim);">
        Novo por aqui? <a href="cadastro.html" style="color: var(--gold); text-decoration: none;">Crie sua conta acadêmica</a>
      </p>
    </div>
  </div>
</body>
</html>
