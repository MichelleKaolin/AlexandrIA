<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contato & Feedback — AlexandrIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #0B1523; --navy-mid: #132035; --navy-light: #1C2E47; --navy-card: #162540; --gold: #C9943A; --gold-light: #E8B96A; --white: #FFFFFF; --text-dim: #A0AEC0; }
    body { font-family: 'DM Sans', sans-serif; background-color: var(--navy); color: var(--white); line-height: 1.6; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 8%; background: rgba(11, 21, 35, 0.95); border-bottom: 1px solid rgba(201, 148, 58, 0.2); }
    .nav-logo-text { color: var(--gold); font-size: 1.5rem; font-weight: 700; font-family: 'Playfair Display', serif; text-decoration: none; }
    .container { max-width: 900px; margin: 4rem auto; padding: 0 2rem; }
    h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.5rem; margin-bottom: 2rem; text-align: center; }
    .card { background: var(--navy-card); border: 1px solid rgba(201, 148, 58, 0.15); border-radius: 12px; padding: 2.5rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; color: var(--gold-light); margin-bottom: 0.5rem; font-size: 0.9rem; }
    input, textarea, select { width: 100%; background: var(--navy-mid); border: 1px solid rgba(201, 148, 58, 0.3); padding: 0.8rem; border-radius: 4px; color: white; outline: none; }
    input:focus, textarea:focus { border-color: var(--gold); }
    .btn-submit { background: var(--gold); color: var(--navy); padding: 1rem 2rem; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; }
    .btn-submit:hover { background: var(--gold-light); transform: translateY(-2px); }
  </style>
</head>
<body>
  <nav><a href="index_original.html" class="nav-logo-text">Alexandr<span style="color:white;font-style:italic">IA</span></a></nav>
  <div class="container">
    <h1>Fale Conosco</h1>
    <div class="card">
      <form>
        <div class="form-group">
          <label>Assunto</label>
          <select>
            <option>Suporte Técnico</option>
            <option>Feedback da Plataforma</option>
            <option>Sugestão de Funcionalidade</option>
            <option>Outros</option>
          </select>
        </div>
        <div class="form-group">
          <label>Sua Mensagem / Feedback</label>
          <textarea rows="5" placeholder="Como podemos melhorar sua experiência acadêmica?"></textarea>
        </div>
        <div class="form-group">
          <label>Como você avalia a precisão da IA?</label>
          <div style="display:flex; gap:10px;">
            <input type="radio" name="rating" id="r1"> ⭐
            <input type="radio" name="rating" id="r2"> ⭐⭐
            <input type="radio" name="rating" id="r3"> ⭐⭐⭐
            <input type="radio" name="rating" id="r4"> ⭐⭐⭐⭐
            <input type="radio" name="rating" id="r5"> ⭐⭐⭐⭐⭐
          </div>
        </div>
        <button type="submit" class="btn-submit">Enviar para o Conselho Acadêmico</button>
      </form>
    </div>
  </div>
</body>
</html>
