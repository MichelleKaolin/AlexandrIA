<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contribuir — AlexandrIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #0B1523; --navy-mid: #132035; --navy-light: #1C2E47; --navy-card: #162540; --gold: #C9943A; --gold-light: #E8B96A; --white: #FFFFFF; --text-dim: #A0AEC0; }
    body { font-family: 'DM Sans', sans-serif; background-color: var(--navy); color: var(--white); line-height: 1.6; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 8%; background: rgba(11, 21, 35, 0.95); border-bottom: 1px solid rgba(201, 148, 58, 0.2); }
    .nav-logo { text-decoration: none; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.5rem; }
    .nav-logo-text { color: var(--gold); }
    .nav-logo-ia { color: var(--white); font-style: italic; }
    .container { max-width: 800px; margin: 4rem auto; padding: 0 2rem; }
    h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.5rem; margin-bottom: 1rem; text-align: center; }
    .card { background: var(--navy-card); border: 1px solid rgba(201, 148, 58, 0.15); border-radius: 12px; padding: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; color: var(--gold-light); margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500; }
    input, select, textarea { width: 100%; background: var(--navy-mid); border: 1px solid rgba(201, 148, 58, 0.3); padding: 0.8rem; border-radius: 4px; color: white; outline: none; transition: 0.3s; }
    input:focus { border-color: var(--gold); }
    .btn-submit { background: var(--gold); color: var(--navy); padding: 1rem; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 1rem; }
    .btn-submit:hover { background: var(--gold-light); transform: translateY(-2px); }
    .btn-back { display: inline-block; margin-bottom: 2rem; color: var(--text-dim); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
    .btn-back:hover { color: var(--gold); }
    .upload-area { border: 2px dashed rgba(201, 148, 58, 0.3); padding: 2rem; text-align: center; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <nav><a href="index_original.html" class="nav-logo"><span class="nav-logo-text">Alexandr</span><span class="nav-logo-ia">IA</span></a></nav>
  <div class="container">
    <a href="perfil.html" class="btn-back">← Voltar ao Início</a>
    <h1>Contribuir com o Acervo</h1>
    <div class="card">
      <form>
        <div class="form-group"><label>Título do Trabalho</label><input type="text" placeholder="Ex: Impacto da IA na Logística"></div>
        <div class="form-group"><label>Tipo de Documento</label><select><option>TCC / Monografia</option><option>Artigo Científico</option><option>Tese</option></select></div>
        <div class="form-group"><label>Ano de Publicação</label><input type="number" value="2026"></div>
        <div class="form-group"><label>Arquivo (PDF)</label><div class="upload-area">Arraste o PDF ou clique para selecionar</div></div>
        <button type="submit" class="btn-submit">Publicar Documento</button>
      </form>
    </div>
  </div>
</body>
</html>
